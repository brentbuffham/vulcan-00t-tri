<!DOCTYPE html>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
.panel { position: absolute; top: 0; bottom: 0; overflow: hidden; }
#left { left: 0; width: 50%; border-right: 2px solid #333; }
#right { right: 0; width: 50%; }
.panel canvas { width: 100% !important; height: 100% !important; }
.label {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); padding: 6px 16px; border-radius: 6px;
  font-size: 14px; font-weight: 600; z-index: 5; pointer-events: none;
}
#left .label { color: #4ade80; }
#right .label { color: #f97316; }

  position: absolute; bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 6px;

}
.drop-hint {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center; color: #555; z-index: 3; pointer-events: none;
}

  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);

}

  background: #2a2a4a; color: #e0e0e0; border: 1px solid #444;

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js" } }

<script type="module">
import * as THREE from 'three';

// ═════════════════════════════════════════════════
// DXF PARSER (3DFACE only)
// ═════════════════════════════════════════════════
function parseDXF(text) {
  const verts = [], faces = [];
  const vm = new Map();
  function vkey(x,y,z) { return `${x.toFixed(4)},${y.toFixed(4)},${z.toFixed(4)}`; }
  function getVi(x,y,z) {
    const k = vkey(x,y,z);
    if (vm.has(k)) return vm.get(k);
    const i = verts.length;
    verts.push([x,y,z]);
    vm.set(k, i);
    return i;
  }

  const lines = text.split(/\r?\n/);
  let i = 0;
  while (i < lines.length) {
    if (lines[i].trim() === '3DFACE') {
      const pts = {};
      i++;
      while (i < lines.length - 1) {
        const code = parseInt(lines[i].trim());
        const val = lines[i+1].trim();
        if (code === 0) break;
        if (code >= 10 && code <= 37) pts[code] = parseFloat(val);
        i += 2;
      }
      if (pts[10] !== undefined) {
        const v0 = getVi(pts[10]||0, pts[20]||0, pts[30]||0);
        const v1 = getVi(pts[11]||0, pts[21]||0, pts[31]||0);
        const v2 = getVi(pts[12]||0, pts[22]||0, pts[32]||0);
        faces.push([v0,v1,v2]);
      }
    } else { i++; }
  }
  return { vertices: verts, faces, warnings: [] };
}

// ═════════════════════════════════════════════════
// OOT PARSER (same as oot-viewer.html)
// ═════════════════════════════════════════════════
function isSep(b) { return (b & 0x07) === 0x07 && b >= 0x07; }
function readBE64(bytes) {
  const buf = new ArrayBuffer(8);
  const v = new DataView(buf);
  for (let i = 0; i < 8; i++) v.setUint8(i, bytes[i] || 0);
  return v.getFloat64(0, false);
}
function findBytes(data, needle, start = 0) {
  outer: for (let i = start; i <= data.length - needle.length; i++) {
    for (let j = 0; j < needle.length; j++) if (data[i+j] !== needle[j]) continue outer;
    return i;
  }
  return -1;
}

function parseOOT(arrayBuffer) {
  const data = new Uint8Array(arrayBuffer);
  const warnings = [];
  if (data.length < 64) return { vertices:[], faces:[], warnings:['File too small'], nVertsHeader:0, nFacesHeader:0 };
  const magic = (data[0]<<24)|(data[1]<<16)|(data[2]<<8)|data[3];
  if ((magic >>> 0) !== 0xEAFBA78A) warnings.push('Bad magic');

  // ── 1. Find data section ──
  const vNeedle = [0x56,0x61,0x72,0x69,0x61,0x6E,0x74]; // "Variant"
  const vi = findBytes(data, vNeedle);
  console.log('[parseOOT v2] data.length=', data.length, 'Variant at', vi, 'magic=0x'+(magic>>>0).toString(16));
  if (vi < 0) return { vertices:[], faces:[], warnings:['No Variant marker'], nVertsHeader:0, nFacesHeader:0 };

  const variantLen = data[vi - 1];
  const ds = vi + variantLen;
  const isNewFormat = variantLen > 8;
  console.log('[parseOOT v2] variantLen=', variantLen, 'ds=', ds, 'isNewFormat=', isNewFormat);

  // ── 2. Find anchor and counts ──
  const anchorNeedle = [0x43, 0xE0, 0x0E];
  let anchor = -1;
  for (let i = ds; i < ds + 20 && i + 2 < data.length; i++) {
    if (data[i] === 0x43 && data[i+1] === 0xE0 && data[i+2] === 0x0E) { anchor = i; break; }
  }
  if (anchor < 0) return { vertices:[], faces:[], warnings:['No header anchor pattern'], nVertsHeader:0, nFacesHeader:0 };

  const nVertsHeader = data[anchor + 7];
  const nFacesHeader = data[anchor + 14];

  // ── 3. Find coord_start ──
  let coordStart = -1;
  for (let off = 15; off < 25; off++) {
    const pos = anchor + off;
    if (pos + 2 < data.length && data[pos] === 0xE0 && data[pos + 2] === 0x14) {
      coordStart = pos + 3;
      break;
    }
  }
  if (coordStart < 0) {
    for (let off = 15; off < 25; off++) {
      const pos = anchor + off;
      if (pos < data.length && data[pos] <= 0x06) {
        coordStart = pos;
        break;
      }
    }
  }
  if (coordStart < 0) coordStart = anchor + 18;

  // ── 4. Find boundaries ──
  const shadedNeedle = [0x53,0x48,0x41,0x44,0x45,0x44]; // "SHADED"
  let shadedPos = findBytes(data, shadedNeedle, ds);
  if (shadedPos < 0) shadedPos = data.length;

  // Face section end: "separator_line" marks attribute data start
  const sepLineNeedle = [0x73,0x65,0x70,0x61,0x72,0x61,0x74,0x6F,0x72,0x5F,0x6C,0x69,0x6E,0x65];
  let sepLinePos = findBytes(data, sepLineNeedle, ds);
  let faceEnd = sepLinePos > 0 ? sepLinePos - 2 : shadedPos;

  let faceMarker = -1;
  if (isNewFormat) {
    // New format: find first E0:03 terminator, then first "20 00 40:xx" after it
    let firstE003 = -1;
    for (let i = coordStart + 10; i < faceEnd - 1; i++) {
      if (data[i] === 0xE0 && data[i+1] === 0x03) { firstE003 = i; break; }
    }
    if (firstE003 > 0) {
      for (let i = firstE003; i < faceEnd - 1; i++) {
        if (data[i] === 0x20 && data[i+1] === 0x00 && i+2 < faceEnd && (data[i+2] & 0xE0) === 0x40) {
          faceMarker = i; break;
        }
      }
    }
    // Fallback: last "20 00" before faceEnd
    if (faceMarker < 0) {
      for (let i = faceEnd - 2; i > coordStart; i--) {
        if (data[i] === 0x20 && data[i+1] === 0x00) { faceMarker = i; break; }
      }
    }
  } else {
    // Old format: last "20 00" before faceEnd
    for (let i = faceEnd - 2; i > coordStart; i--) {
      if (data[i] === 0x20 && data[i+1] === 0x00) { faceMarker = i; break; }
    }
  }

  const coordEnd = faceMarker > 0 ? faceMarker : faceEnd;

  // ── 5. Parse coord elements ──
  const coordRegion = data.slice(coordStart, coordEnd);
  const prev = new Uint8Array(8);
  let pos = 0;
  const elements = [];
  // Dynamic IDELTA threshold: after first 3 FULL values, set to 3× max
  const fullValues = [];
  let ideltaThreshold = 10000;

  // Helper: read uint64 big-endian from 8-byte array
  function readUint64BE(bytes) {
    // Returns as two 32-bit parts for full 64-bit precision
    let hi = 0, lo = 0;
    for (let i = 0; i < 4; i++) hi = (hi * 256) + (bytes[i] || 0);
    for (let i = 4; i < 8; i++) lo = (lo * 256) + (bytes[i] || 0);
    return [hi, lo]; // [high32, low32]
  }

  // Helper: add signed delta to uint64
  function addDeltaToUint64(prevHiLo, deltaBytes, nBytes) {
    // Read delta as unsigned big-endian
    let dVal = 0;
    for (let i = 0; i < nBytes; i++) dVal = dVal * 256 + deltaBytes[i];
    // Check sign bit
    let negative = false;
    if (deltaBytes[0] >= 0x80) {
      // Signed: subtract 1 << (nBytes*8)
      negative = true;
    }

    // Use BigInt for full 64-bit precision (available in all modern browsers)
    let prevBig = BigInt(prevHiLo[0]) * BigInt(0x100000000) + BigInt(prevHiLo[1]);
    let deltaBig = BigInt(dVal);
    if (negative) {
      deltaBig -= (BigInt(1) << BigInt(nBytes * 8));
    }
    let resultBig = (prevBig + deltaBig) & BigInt("0xFFFFFFFFFFFFFFFF");

    // Convert back to 8 bytes
    const result = new Uint8Array(8);
    for (let i = 7; i >= 0; i--) {
      result[i] = Number(resultBig & BigInt(0xFF));
      resultBig >>= BigInt(8);
    }
    return result;
  }

  while (pos < coordRegion.length) {
    const b = coordRegion[pos];
    if (b <= 0x06 || (isNewFormat && b === 0x07)) {
      let nb = b + 1;
      const rawNb = nb;
      if (pos + 1 + nb > coordRegion.length) break;

      let stored = Array.from(coordRegion.slice(pos + 1, pos + 1 + nb));

      // Escape stripping (new format only)
      if (isNewFormat && stored.length > 1) {
        let stripped = stored.slice();
        while (stripped.length > 1 && (stripped[0] >= 0xFC || stripped[0] === 0x00)) {
          const candidate = stripped.slice(1);
          if (candidate[0] === 0x40 || candidate[0] === 0x41 || candidate[0] === 0xC0 || candidate[0] === 0xC1) {
            stored = candidate;
            nb = stored.length;
            break;
          } else if (candidate[0] >= 0xFC || candidate[0] === 0x00) {
            stripped = candidate;
            continue;
          } else {
            break;
          }
        }
      }

      let r, kind;
      const isFull = (stored[0] === 0x40 || stored[0] === 0x41 || stored[0] === 0xC0 || stored[0] === 0xC1);

      if (isFull) {
        r = new Uint8Array(8);
        for (let i = 0; i < nb && i < 8; i++) r[i] = stored[i];
        kind = 'FULL';
        // Track FULL values for dynamic IDELTA threshold
        const fv = readBE64(r);
        if (Math.abs(fv) > 1) {
          fullValues.push(Math.abs(fv));
          if (fullValues.length === 3) {
            ideltaThreshold = Math.max(...fullValues) * 3;
          }
        }
      } else {
        r = new Uint8Array(8);
        r[0] = prev[0];
        for (let i = 0; i < nb && i + 1 < 8; i++) r[i + 1] = stored[i];
        if (isNewFormat) {
          // New format: zero out trailing bytes (already zero from Uint8Array init)
        } else {
          // Old format: keep trailing bytes from previous
          for (let i = nb + 1; i < 8; i++) r[i] = prev[i];
        }
        kind = 'DELTA';

        // Signed integer delta fallback (new format only)
        if (isNewFormat) {
          const testVal = readBE64(r);
          if (Math.abs(testVal) > ideltaThreshold) {
            const prevHiLo = readUint64BE(prev);
            const result = addDeltaToUint64(prevHiLo, stored.slice(0, rawNb), rawNb);
            r = result;
            kind = 'IDELTA';
          }
        }
      }

      // Ensure 8 bytes
      const r8 = new Uint8Array(8);
      for (let i = 0; i < 8; i++) r8[i] = r[i] || 0;

      const val = readBE64(r8);
      for (let i = 0; i < 8; i++) prev[i] = r8[i];
      elements.push({ etype: 'COORD', value: val, kind: kind, nBytes: nb });
      pos += 1 + rawNb;
    } else if (isSep(b)) {
      elements.push({ etype: 'SEP', sepByte: b });
      pos += 1;
    } else if (pos + 1 < coordRegion.length) {
      const b2 = coordRegion[pos + 1];
      const hiCls = b & 0xE0;
      const cls = {0x20:'20', 0x40:'40', 0x60:'60', 0x80:'80', 0xA0:'A0', 0xC0:'C0', 0xE0:'E0'}[hiCls] || (b.toString(16).padStart(2,'0').toUpperCase());
      elements.push({ etype: 'TAG', cls: cls, byte2: b2, loNib: b2 & 0x0F, hiNib: (b2 >> 4) & 0x0F });
      pos += 2;
    } else {
      break;
    }
  }

  // ── 6. Group elements ──
  const groups = [];
  let currentGroup = null;
  for (const el of elements) {
    if (el.etype === 'COORD') {
      if (currentGroup !== null) groups.push(currentGroup);
      currentGroup = { value: el.value, kind: el.kind, nBytes: el.nBytes, tags: [], seps: [], axis: -1, c0Assignments: [] };
    } else if (currentGroup !== null) {
      if (el.etype === 'TAG') {
        currentGroup.tags.push(el);
      } else if (el.etype === 'SEP') {
        currentGroup.seps.push(el.sepByte);
      }
    }
  }
  if (currentGroup !== null) groups.push(currentGroup);

  // ── 7. Assign axes (closest-delta heuristic) ──
  if (groups.length >= 3) {
    groups[0].axis = 0;
    groups[1].axis = 1;
    groups[2].axis = 2;
    const current = [groups[0].value, groups[1].value, groups[2].value];
    for (let i = 3; i < groups.length; i++) {
      const g = groups[i];
      let bestAx = 0, bestDelta = Math.abs(g.value - current[0]);
      for (let ax = 1; ax < 3; ax++) {
        const d = Math.abs(g.value - current[ax]);
        if (d < bestDelta) { bestDelta = d; bestAx = ax; }
      }
      g.axis = bestAx;
      current[bestAx] = g.value;
    }
  } else {
    for (let i = 0; i < groups.length; i++) groups[i].axis = i;
  }

  // ── 8. Extract vertex assignments ──
  const assignerClasses = new Set(['C0', '80', '60', 'A0', '20']);
  for (const g of groups) {
    for (const t of g.tags) {
      if (assignerClasses.has(t.cls) && t.hiNib > 0) {
        g.c0Assignments.push([t.hiNib, t.loNib]);
      }
    }
  }

  // Collect coord values for debug
  const coordValues = groups.map(g => g.value);

  // ── 9. Trim coord groups ──
  let trimmedGroups = groups;
  if (groups.length >= 3) {
    const basePositive = groups[0].value >= 0 && groups[1].value >= 0 && groups[2].value >= 0;
    if (basePositive) {
      for (let i = 3; i < groups.length; i++) {
        if (groups[i].value < 0) {
          trimmedGroups = groups.slice(0, i);
          break;
        }
      }
    }
  }

  // ── 10. Trim coord values (exclude face data leakage) ──
  const baseVals = trimmedGroups.length >= 3 ? [trimmedGroups[0].value, trimmedGroups[1].value, trimmedGroups[2].value] : [0,0,0];
  const baseMin = Math.min(...baseVals.map(Math.abs).filter(v => v > 0)) || 1;
  const basePositive = baseVals.every(v => v >= 0);
  let trimmedCoords = coordValues.slice();
  for (let ci = 3; ci < trimmedCoords.length; ci++) {
    const v = trimmedCoords[ci];
    if (basePositive && v < 0) { trimmedCoords = trimmedCoords.slice(0, ci); break; }
    if (baseMin > 10 && Math.abs(v) < baseMin / 20) { trimmedCoords = trimmedCoords.slice(0, ci); break; }
  }

  // Vertices will be built during face decoding (coupled builder)
  const vertices = [];

  // ── 11. Face decoder (EdgeBreaker) ──
  const faces = [];

  if (faceMarker > 0) {
    const faceRegion = data.slice(faceMarker, faceEnd);

    // Parse face section elements
    const faceElements = [];
    let fpos = 0;
    while (fpos < faceRegion.length) {
      const fb = faceRegion[fpos];
      if (fb <= 0x06) {
        const fnb = fb + 1;
        if (fpos + 1 + fnb > faceRegion.length) break;
        // Read DATA value as big-endian integer
        let dv = 0;
        for (let j = 0; j < fnb; j++) {
          dv = dv * 256 + faceRegion[fpos + 1 + j];
        }
        faceElements.push({ type: 'DATA', value: dv, offset: fpos });
        fpos += 1 + fnb;
      } else if (isSep(fb)) {
        faceElements.push({ type: 'SEP', value: fb, offset: fpos });
        fpos += 1;
      } else if (fpos + 1 < faceRegion.length) {
        const fb2 = faceRegion[fpos + 1];
        const hiCls = fb & 0xE0;
        let cls = {0x20:'20', 0x40:'40', 0xC0:'C0', 0xE0:'E0'}[hiCls] || (fb.toString(16).padStart(2,'0').toUpperCase());
        if (fb === 0xE1) cls = 'E1';
        const lo = fb2 & 0x0F;
        const hi = (fb2 >> 4) & 0x0F;
        faceElements.push({ type: 'TAG', cls: cls, byte2: fb2, lo: lo, hi: hi, offset: fpos });
        fpos += 2;
      } else {
        break;
      }
    }

    // Extract topology ops (40/C0/E1 class tags)
    const topologyOps = [];
    for (const el of faceElements) {
      if (el.type === 'TAG' && (el.cls === '40' || el.cls === 'C0' || el.cls === 'E1')) {
        topologyOps.push({ cls: el.cls, byte2: el.byte2, lo: el.lo, hi: el.hi, offset: el.offset });
      }
    }

    // Extract vertex references (DATA values that are valid vertex indices)
    const maxRef = Math.max(nVertsHeader, 20);
    const vertexRefs = [];
    for (const el of faceElements) {
      if (el.type === 'DATA') {
        const dv = el.value;
        if (dv >= 1 && dv <= maxRef && dv !== 0x40 && dv !== 0x82 && dv !== 0xC0) {
          vertexRefs.push(dv);
        }
      }
    }

    // Identify initial triangle vertices
    // Pattern: after 20:00 start, look for DATA values before first E0 or topology tag
    const initialVerts = [];
    let foundStart = false;
    for (const el of faceElements) {
      if (el.type === 'TAG' && el.cls === '20' && el.byte2 === 0x00) {
        foundStart = true;
        continue;
      }
      if (foundStart) {
        if (el.type === 'TAG' && (el.cls === '40' || el.cls === 'C0')) break;
        if (el.type === 'DATA' && el.value >= 1 && el.value <= maxRef) {
          initialVerts.push(el.value);
        }
        if (el.type === 'TAG' && el.cls === 'E0') break;
      }
    }

    // Determine initial triangle (1-based to 0-based)
    let initTri;
    if (initialVerts.length >= 3) {
      initTri = [initialVerts[0] - 1, initialVerts[1] - 1, initialVerts[2] - 1];
    } else {
      initTri = [0, 1, 2];
    }

    // ── Coupled EdgeBreaker: build vertices AND faces together ──
    // V0 = base, V1/V2 from running state
    if (trimmedCoords.length >= 3) {
      vertices.push([trimmedCoords[0], trimmedCoords[1], trimmedCoords[2]]);
      const running = [trimmedCoords[0], trimmedCoords[1], trimmedCoords[2]];
      let coordIdx = 3;
      for (let vi = 1; vi < Math.min(3, nVertsHeader); vi++) {
        if (coordIdx < trimmedCoords.length) {
          const val = trimmedCoords[coordIdx++];
          const deltas = [Math.abs(val-running[0]), Math.abs(val-running[1]), Math.abs(val-running[2])];
          const bestAx = deltas.indexOf(Math.min(...deltas));
          running[bestAx] = val;
          vertices.push([running[0], running[1], running[2]]);
        }
      }

      // Build separator context
      let lastSep2 = null;
      const opsWithSep = [];
      for (const el of faceElements) {
        if (el.type === 'SEP') { lastSep2 = el.value; }
        else if (el.type === 'TAG' && (el.cls === '40' || el.cls === 'C0' || el.cls === 'E1')) {
          opsWithSep.push({ cls: el.cls, byte2: el.byte2, lo: el.lo, hi: el.hi, sep: lastSep2 });
          lastSep2 = null;
        }
      }

      // EdgeBreaker state
      faces.push(initTri.slice());
      let bnd = initTri.slice();
      let gate = 1;
      let nv = vertices.length;
      let cOpsRemaining = Math.max(nVertsHeader - vertices.length, 0);
      let lastOp = null;
      const debugTrace = [];

      for (const op of opsWithSep) {
        if (!bnd.length) break;
        if (op.byte2 === 0x1B) {
          gate = ((gate - 1) % bnd.length + bnd.length) % bnd.length;
          debugTrace.push({op:'FIN',byte2:op.byte2,sep:op.sep});
          continue;
        }

        const n = bnd.length;
        if (n < 3) break;
        const li = gate % n;
        const ri = (gate + 1) % n;
        const L = bnd[li], R = bnd[ri];
        const prevOnBnd = bnd[((gate - 1) % n + n) % n];
        const sep = op.sep;
        let opType = '?';

        // Determine operation from separator
        if (sep !== null) {
          if (sep === 0x5F || sep === 0x87) opType = 'R';
          else opType = cOpsRemaining > 0 ? 'C' : (n >= 4 ? 'R' : 'E');
        } else {
          if (lastOp === null || lastOp === 'E') opType = cOpsRemaining > 0 ? 'C' : 'E';
          else if (lastOp === 'C') opType = n >= 4 ? 'R' : 'E';
          else if (lastOp === 'R') opType = n >= 4 ? 'L' : 'E';
          else if (lastOp === 'L') opType = n === 3 ? 'E' : 'L';
          else opType = 'E';
        }

        if (opType === 'C' && cOpsRemaining > 0) {
          // BUILD VERTEX from boundary + coord value
          let vCoords;
          if (coordIdx < trimmedCoords.length) {
            const val = trimmedCoords[coordIdx++];
            // Try both L and R, pick smallest delta
            let bestScore = -1;
            vCoords = [running[0], running[1], running[2]];
            for (const refIdx of [L, R]) {
              const ref = refIdx < vertices.length ? vertices[refIdx] : running;
              for (let ax = 0; ax < 3; ax++) {
                const score = Math.abs(val - ref[ax]);
                if (bestScore < 0 || score < bestScore) {
                  bestScore = score;
                  vCoords = [ref[0], ref[1], ref[2]];
                  vCoords[ax] = val;
                }
              }
            }
          } else {
            vCoords = [running[0], running[1], running[2]];
          }

          const vIdx = nv++;
          cOpsRemaining--;
          vertices.push(vCoords);
          for (let i = 0; i < 3; i++) running[i] = vCoords[i];

          faces.push([L, R, vIdx]);
          bnd.splice(li + 1, 0, vIdx);
          gate = li + 1;
          lastOp = 'C';
          debugTrace.push({op:'C',byte2:op.byte2,hi:op.hi,lo:op.lo,sep:op.sep,L,R,prevBnd:prevOnBnd,bndSize:n,newV:vIdx});

        } else if (opType === 'R' && n >= 4) {
          const fr = bnd[(gate + 2) % n];
          faces.push([L, R, fr]);
          bnd.splice(ri, 1);
          if (gate >= bnd.length) gate = gate % bnd.length;
          lastOp = 'R';
          debugTrace.push({op:'R',byte2:op.byte2,hi:op.hi,lo:op.lo,sep:op.sep,L,R,prevBnd:prevOnBnd,bndSize:n,newV:null});

        } else if (opType === 'L' && n >= 4) {
          const fl = bnd[((gate - 1) % n + n) % n];
          faces.push([fl, L, R]);
          bnd.splice(li, 1);
          gate = ((li - 1) % bnd.length + bnd.length) % bnd.length;
          lastOp = 'L';
          debugTrace.push({op:'L',byte2:op.byte2,hi:op.hi,lo:op.lo,sep:op.sep,L,R,prevBnd:prevOnBnd,bndSize:n,newV:null});

        } else if (opType === 'E') {
          if (n === 3) {
            faces.push([bnd[0], bnd[1], bnd[2]]);
            bnd = [];
          } else if (n >= 4) {
            const fl = bnd[((gate - 1) % n + n) % n];
            faces.push([fl, L, R]);
            bnd.splice(li, 1);
            gate = ((li - 1) % bnd.length + bnd.length) % bnd.length;
          }
          lastOp = 'E';
          debugTrace.push({op:'E',byte2:op.byte2,hi:op.hi,lo:op.lo,sep:op.sep,L,R,prevBnd:prevOnBnd,bndSize:n,newV:null});
        }
      }

      warnings._debugTrace = debugTrace;
    }
  }

  // Filter out faces referencing non-existent vertices
  const validFaces = faces.filter(f => f.every(vi => vi >= 0 && vi < vertices.length));

  console.log('[parseOOT v2] Result:', vertices.length, 'verts,', validFaces.length, 'faces');
  console.log('[parseOOT v2] First 5 verts:', vertices.slice(0,5).map(v => `(${v[0]?.toFixed(1)},${v[1]?.toFixed(1)},${v[2]?.toFixed(1)})`).join(' '));
  if (warnings.length) console.log('[parseOOT v2] Warnings:', warnings);

  // Build debug info
  const debugInfo = {
    coordValues: coordValues,
    groups: groups.map((g,i) => ({
      idx: i, value: g.value, kind: g.kind, axis: g.axis,
      tags: g.tags.map(t => `${t.cls}:${t.byte2.toString(16).padStart(2,'0')}`),
      c0: g.c0Assignments,
    })),
    trace: warnings._debugTrace || [],
    isNewFormat,
  };
  delete warnings._debugTrace;
  delete warnings._coordValues;
  delete warnings._opsWithSep;

  return {
    vertices: vertices.slice(0, nVertsHeader || vertices.length).map(v => [v[0] || 0, v[1] || 0, v[2] || 0]),
    faces: validFaces,
    warnings,
    nVertsHeader,
    nFacesHeader,
    debugInfo
  };
}

// ═════════════════════════════════════════════════
// THREE.JS DUAL VIEWER
// ═════════════════════════════════════════════════
let scenes = {}, cameras = {}, renderers = {};
let meshes = { left: null, right: null };
let wires = { left: null, right: null };
let points = { left: null, right: null };
let labels = { left: [], right: [] };
let showWire = false, showPts = false, showLabels = true, showZLabels = false;
let theta = Math.PI/4, phi = Math.PI/3, radius = 500;
let target = new THREE.Vector3();
let isDragging = false, prevX = 0, prevY = 0;
let currentOOT = null;

function initPanel(id) {
  const el = document.getElementById(id);
  const s = new THREE.Scene();
  s.background = new THREE.Color(0x1a1a2e);
  s.add(new THREE.AmbientLight(0x404060, 2));
  const d1 = new THREE.DirectionalLight(0xffffff, 1.5); d1.position.set(1,2,3); s.add(d1);
  const d2 = new THREE.DirectionalLight(0x6666ff, 0.5); d2.position.set(-1,-1,-2); s.add(d2);
  s.add(new THREE.AxesHelper(50));

  const c = new THREE.PerspectiveCamera(60, el.clientWidth/el.clientHeight, 0.1, 100000);
  const r = new THREE.WebGLRenderer({ antialias: true });
  r.setSize(el.clientWidth, el.clientHeight);
  r.setPixelRatio(window.devicePixelRatio);
  el.appendChild(r.domElement);

  scenes[id] = s; cameras[id] = c; renderers[id] = r;
}

function updateCameras() {
  for (const id of ['left','right']) {
    const c = cameras[id];
    if (!c) continue;
    c.position.set(
      target.x + radius * Math.sin(phi) * Math.cos(theta),
      target.y + radius * Math.cos(phi),
      target.z + radius * Math.sin(phi) * Math.sin(theta)
    );
    c.lookAt(target);
  }
}

function animate() {
  requestAnimationFrame(animate);
  for (const id of ['left','right']) {
    if (renderers[id] && scenes[id] && cameras[id])
      renderers[id].render(scenes[id], cameras[id]);
  }
}

function makeTextSprite(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 32;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color || '#ffffff';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text, 32, 24);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(20, 10, 1);
  return sprite;
}

function loadMesh(panelId, result, color) {
  const s = scenes[panelId];
  if (meshes[panelId]) { s.remove(meshes[panelId]); meshes[panelId].geometry.dispose(); }
  if (wires[panelId]) { s.remove(wires[panelId]); wires[panelId].geometry.dispose(); }
  if (points[panelId]) { s.remove(points[panelId]); points[panelId].geometry.dispose(); }
  for (const lb of labels[panelId]) s.remove(lb);
  labels[panelId] = [];

  const geo = new THREE.BufferGeometry();
  const pos = [];
  for (const [x,y,z] of result.vertices) {
    const px = isFinite(x) ? x : 0, py = isFinite(y) ? y : 0, pz = isFinite(z) ? z : 0;
    pos.push(px, pz, -py); // Z-up to Y-up
  }
  const idx = [];
  for (const [a,b,c] of result.faces) {
    if (a < result.vertices.length && b < result.vertices.length && c < result.vertices.length)
      idx.push(a,b,c);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  if (idx.length) {
    geo.setIndex(idx);
    geo.computeVertexNormals();
  }

  const mat = new THREE.MeshPhongMaterial({ color, side: THREE.DoubleSide, flatShading: true, shininess: 0, transparent: true, opacity: 0.6 });
  meshes[panelId] = new THREE.Mesh(geo, mat);
  s.add(meshes[panelId]);
  

  if (idx.length) {
    const wg = new THREE.WireframeGeometry(geo);
    wires[panelId] = new THREE.LineSegments(wg, new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.8, transparent: true }));
    wires[panelId].visible = showWire;
    s.add(wires[panelId]);
  }

  // Color points by axis value (Z=blue gradient, or per-axis coloring)
  geo.computeBoundingBox();
  const box = geo.boundingBox;
  const center = new THREE.Vector3(); box.getCenter(center);
  const size = box.getSize(new THREE.Vector3()).length();

  // Build per-vertex colors: color by Z value (blue=low, red=high)
  const colors = new Float32Array(result.vertices.length * 3);
  let zMin = Infinity, zMax = -Infinity;
  for (const [x,y,z] of result.vertices) { if (isFinite(z)) { zMin = Math.min(zMin, z); zMax = Math.max(zMax, z); } }
  const zRange = zMax - zMin || 1;
  for (let i = 0; i < result.vertices.length; i++) {
    const z = result.vertices[i][2];
    const t = (z - zMin) / zRange; // 0=low Z, 1=high Z
    colors[i*3+0] = t;           // R: high at top
    colors[i*3+1] = 0.2;         // G: dim
    colors[i*3+2] = 1.0 - t;     // B: high at bottom
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

  const pm = new THREE.PointsMaterial({ size: 8, sizeAttenuation: false, vertexColors: true });
  points[panelId] = new THREE.Points(geo, pm);
  points[panelId].visible = true;
  s.add(points[panelId]);

  // Store a flat-color material for toggling
  points[panelId]._colorMat = pm;
  points[panelId]._flatMat = new THREE.PointsMaterial({ color: 0xff6666, size: 6, sizeAttenuation: false });

  // Vertex labels with Z value and axis info
  const labelColor = panelId === 'left' ? '#4ade80' : '#fb923c';
  const labelScale = Math.max(size * 0.06, 1);
  for (let i = 0; i < result.vertices.length; i++) {
    const [x,y,z] = result.vertices[i];
    if (!isFinite(x) || !isFinite(y) || !isFinite(z)) continue;
    // Show index + Z value in label
    const labelText = showZLabels ? `${i} z=${z.toFixed(0)}` : String(i);
    const sprite = makeTextSprite(labelText, labelColor);
    sprite.position.set(x, z + labelScale * 1.2, -y);
    sprite.scale.set(labelScale * (showZLabels ? 3 : 2), labelScale, 1);
    sprite.visible = showLabels;
    s.add(sprite);
    labels[panelId].push(sprite);
  }
  target.copy(center);
  radius = size * 2.5;
  updateCameras();
}

// Mouse controls (synced between panels)
document.addEventListener('mousedown', e => { isDragging=true; prevX=e.clientX; prevY=e.clientY; });
document.addEventListener('mouseup', () => isDragging=false);
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  theta += (e.clientX-prevX)*0.005;
  phi = Math.max(0.01, Math.min(Math.PI-0.01, phi-(e.clientY-prevY)*0.005));
  prevX=e.clientX; prevY=e.clientY;
  updateCameras();
});
document.addEventListener('wheel', e => {
  radius *= e.deltaY > 0 ? 1.1 : 0.9;
  radius = Math.max(1, Math.min(50000, radius));
  updateCameras();
});

// Controls
window.toggleWire = () => { showWire=!showWire; for (const id of ['left','right']) if(wires[id]) wires[id].visible=showWire; };
window.togglePts = () => { showPts=!showPts; for (const id of ['left','right']) if(points[id]) points[id].visible=showPts; };
window.toggleLabels = () => { showLabels=!showLabels; for (const id of ['left','right']) for (const lb of labels[id]) lb.visible=showLabels; };
window.toggleZColor = () => {
  showZLabels = !showZLabels;
  // Reload meshes to update labels with Z values
  if (currentOOT) {
    // Rebuild OOT labels
    const s = scenes['right'];
    for (const lb of labels['right']) s.remove(lb);
    labels['right'] = [];
    if (currentOOT.vertices.length > 0) {
      const geo = points['right']?.geometry;
      if (geo) {
        geo.computeBoundingBox();
        const sz = geo.boundingBox.getSize(new THREE.Vector3()).length();
        const ls = Math.max(sz * 0.06, 1);
        for (let i = 0; i < currentOOT.vertices.length; i++) {
          const [x,y,z] = currentOOT.vertices[i];
          if (!isFinite(x)||!isFinite(y)||!isFinite(z)) continue;
          const txt = showZLabels ? `${i} z=${z.toFixed(0)}` : String(i);
          const sp = makeTextSprite(txt, '#fb923c');
          sp.position.set(x, z + ls * 1.2, -y);
          sp.scale.set(ls * (showZLabels ? 3 : 2), ls, 1);
          sp.visible = showLabels;
          s.add(sp);
          labels['right'].push(sp);
        }
      }
    }
  }
};
window.resetView = () => { theta=Math.PI/4; phi=Math.PI/3; updateCameras(); };
window.toggleDebug = () => {
  const panel = document.getElementById('debug-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'block' && currentOOT && currentOOT.debugInfo) renderDebug(currentOOT);
};

function renderDebug(result) {
  const d = result.debugInfo;
  if (!d) return;
  const el = document.getElementById('debug-content');
  const axName = ['X','Y','Z'];
  let html = '';

  // Coord palette
  html += '<div style="color:#4ade80;margin-bottom:8px"><b>Coord Palette</b> (unique values from coord section)</div>';
  html += '<table style="border-collapse:collapse;margin-bottom:12px;width:100%">';
  html += '<tr style="color:#888"><td>Idx</td><td>Value</td><td>Kind</td><td>Axis</td><td>Tags</td></tr>';
  for (const g of d.groups.slice(0, 40)) {
    const ax = g.axis >= 0 && g.axis <= 2 ? axName[g.axis] : '?';
    const axColor = g.axis===0?'#f88':g.axis===1?'#8f8':g.axis===2?'#88f':'#888';
    const small = Math.abs(g.value) < 10 && g.idx > 3;
    html += `<tr style="border-top:1px solid #333;${small?'color:#555':''}">`;
    html += `<td style="padding:1px 6px">G${g.idx}</td>`;
    html += `<td style="padding:1px 6px;text-align:right">${g.value.toFixed(2)}</td>`;
    html += `<td style="padding:1px 6px;color:#aaa">${g.kind}</td>`;
    html += `<td style="padding:1px 6px;color:${axColor};font-weight:bold">${ax}</td>`;
    html += `<td style="padding:1px 6px;color:#777;font-size:10px">${g.tags.join(' ')}</td>`;
    html += '</tr>';
  }
  html += '</table>';

  // Vertices
  html += '<div style="color:#f97316;margin-bottom:8px"><b>Vertices</b> (' + result.vertices.length + ')</div>';
  html += '<table style="border-collapse:collapse;margin-bottom:12px;width:100%">';
  html += '<tr style="color:#888"><td>V#</td><td>X</td><td>Y</td><td>Z</td></tr>';
  for (let i = 0; i < Math.min(result.vertices.length, 50); i++) {
    const [x,y,z] = result.vertices[i];
    html += `<tr style="border-top:1px solid #333">`;
    html += `<td style="padding:1px 6px">V${i}</td>`;
    html += `<td style="padding:1px 6px;color:#f88;text-align:right">${x.toFixed(1)}</td>`;
    html += `<td style="padding:1px 6px;color:#8f8;text-align:right">${y.toFixed(1)}</td>`;
    html += `<td style="padding:1px 6px;color:#88f;text-align:right">${z.toFixed(1)}</td>`;
    html += '</tr>';
  }
  html += '</table>';

  // EdgeBreaker trace
  if (d.trace.length > 0) {
    html += '<div style="color:#c084fc;margin-bottom:8px"><b>EdgeBreaker Trace</b> (' + d.trace.length + ' ops)</div>';
    html += '<table style="border-collapse:collapse;margin-bottom:12px;width:100%">';
    html += '<tr style="color:#888"><td>Op</td><td>Tag</td><td>Sep</td><td>L</td><td>R</td><td>Prev</td><td>New</td><td>Bnd</td></tr>';
    for (let i = 0; i < d.trace.length; i++) {
      const t = d.trace[i];
      if (t.op === 'FIN') {
        html += `<tr style="border-top:1px solid #333;color:#555"><td colspan=8>FIN (gate-1)</td></tr>`;
        continue;
      }
      const opColor = t.op==='C'?'#4ade80':t.op==='R'?'#f97316':t.op==='L'?'#60a5fa':t.op==='E'?'#f43f5e':'#888';
      const sepStr = t.sep !== null ? '0x'+t.sep.toString(16).padStart(2,'0') : '-';
      const newStr = t.newV !== null ? `<b style="color:#4ade80">V${t.newV}</b>` : '-';
      html += `<tr style="border-top:1px solid #333">`;
      html += `<td style="padding:1px 4px;color:${opColor};font-weight:bold">${t.op}</td>`;
      html += `<td style="padding:1px 4px">40:${t.byte2.toString(16).padStart(2,'0')}</td>`;
      html += `<td style="padding:1px 4px;color:#777">${sepStr}</td>`;
      html += `<td style="padding:1px 4px">V${t.L}</td>`;
      html += `<td style="padding:1px 4px">V${t.R}</td>`;
      html += `<td style="padding:1px 4px;color:#aaa">V${t.prevBnd}</td>`;
      html += `<td style="padding:1px 4px">${newStr}</td>`;
      html += `<td style="padding:1px 4px;color:#555">${t.bndSize}</td>`;
      html += '</tr>';
    }
    html += '</table>';
  }

  el.innerHTML = html;
}
window.exportOBJ = () => {
  if (!currentOOT) return;
  let obj = '# Vulcan .00t export (Z-up)\n';
  for (const [x,y,z] of currentOOT.vertices) obj += `v ${x} ${y} ${z}\n`;
  for (const [a,b,c] of currentOOT.faces) obj += `f ${a+1} ${b+1} ${c+1}\n`;
  const blob = new Blob([obj], {type:'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='export.obj'; a.click();
};

// Drag & drop
function setupDrop(panelId, handler) {
  const el = document.getElementById(panelId);
  el.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', e => { el.classList.remove('drag-over'); });
  el.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation(); el.classList.remove('drag-over');
    for (const f of e.dataTransfer.files) { handler(f); break; }
  });
}

setupDrop('left', file => {
  const reader = new FileReader();
  reader.onload = e => {
    const result = parseDXF(e.target.result);
    document.getElementById('hint-left').style.display = 'none';
    document.getElementById('info-left').style.display = 'block';
    document.getElementById('lv').textContent = result.vertices.length;
    document.getElementById('lf').textContent = result.faces.length;
    loadMesh('left', result, 0x4ade80);
    console.log('DXF:', result);
  };
  reader.readAsText(file);
});

setupDrop('right', file => {
  const reader = new FileReader();
  reader.onload = e => {
    const result = parseOOT(e.target.result);
    currentOOT = result;
    document.getElementById('hint-right').style.display = 'none';
    document.getElementById('info-right').style.display = 'block';
    document.getElementById('rv').textContent = result.vertices.length;
    document.getElementById('rf').textContent = result.faces.length;
    if (result.warnings.length) {
      document.getElementById('rwarn').style.display = 'block';
      document.getElementById('rwarn').textContent = result.warnings.join('; ');
    }
    // Show vertex list
    const vhtml = result.vertices.map((v,i) =>
      `V${i}: (${v[0].toFixed(1)}, ${v[1].toFixed(1)}, ${v[2].toFixed(1)})`
    ).join('<br>');
    document.getElementById('rverts').innerHTML = vhtml;
    loadMesh('right', result, 0xf97316);
    console.log('OOT:', result);
    // Auto-render debug if panel is open
    if (document.getElementById('debug-panel').style.display !== 'none') renderDebug(result);
  };
  reader.readAsArrayBuffer(file);
});

// Also allow clicking the hints to open file dialogs
document.getElementById('hint-left').style.pointerEvents = 'all';
document.getElementById('hint-left').style.cursor = 'pointer';
document.getElementById('hint-left').addEventListener('click', () => {
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.dxf,.DXF';
  inp.onchange = () => { if (inp.files[0]) { const e = new Event('drop'); document.getElementById('left').dispatchEvent(Object.assign(new DragEvent('drop', { dataTransfer: new DataTransfer() })));  /* fallback */ const r = new FileReader(); r.onload = ev => { const res = parseDXF(ev.target.result); document.getElementById('hint-left').style.display='none'; document.getElementById('info-left').style.display='block'; document.getElementById('lv').textContent=res.vertices.length; document.getElementById('lf').textContent=res.faces.length; loadMesh('left',res,0x4ade80); }; r.readAsText(inp.files[0]); } };
  inp.click();
});
document.getElementById('hint-right').style.pointerEvents = 'all';
document.getElementById('hint-right').style.cursor = 'pointer';
document.getElementById('hint-right').addEventListener('click', () => {
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.00t,.00T';
  inp.onchange = () => { if (inp.files[0]) { const r = new FileReader(); r.onload = ev => { const res = parseOOT(ev.target.result); currentOOT=res; document.getElementById('hint-right').style.display='none'; document.getElementById('info-right').style.display='block'; document.getElementById('rv').textContent=res.vertices.length; document.getElementById('rf').textContent=res.faces.length; if(res.warnings.length){document.getElementById('rwarn').style.display='block';document.getElementById('rwarn').textContent=res.warnings.join('; ');} loadMesh('right',res,0xf97316); }; r.readAsArrayBuffer(inp.files[0]); } };
  inp.click();
});

// Init
window.addEventListener('resize', () => {
  for (const id of ['left','right']) {
    const el = document.getElementById(id);
    if (renderers[id]) { renderers[id].setSize(el.clientWidth, el.clientHeight); }
    if (cameras[id]) { cameras[id].aspect = el.clientWidth/el.clientHeight; cameras[id].updateProjectionMatrix(); }
  }
});

initPanel('left');
initPanel('right');
updateCameras();
animate();
